<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Cornel Media</title>
  <link rel="icon" type="image/png" href="../assets/images/favicon.png" />

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Font Awesome 6 -->
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #E8A030;
      --accent-hover: #d4902a;
      --text-primary: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.4);
      --error: #ff6b6b;
      --card-bg: rgba(255, 255, 255, 0.04);
      --card-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.06);
      --input-border: rgba(255, 255, 255, 0.10);
      --input-border-focus: rgba(232, 160, 48, 0.5);
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #000;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Animated Background */
    .login-bg-effect {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .login-bg-effect::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 80% 60% at 50% 50%,
        rgba(232, 160, 48, 0.05) 0%,
        transparent 70%
      );
    }

    .login-bg-effect::after {
      content: '';
      position: absolute;
      inset: -50%;
      width: 200%;
      height: 200%;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      animation: grainDrift 8s steps(2, end) infinite;
    }

    @keyframes grainDrift {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-2%, -3%); }
      20%  { transform: translate(3%, 2%); }
      30%  { transform: translate(-1%, 4%); }
      40%  { transform: translate(4%, -1%); }
      50%  { transform: translate(-3%, 3%); }
      60%  { transform: translate(2%, -4%); }
      70%  { transform: translate(-4%, 2%); }
      80%  { transform: translate(3%, -2%); }
      90%  { transform: translate(-2%, 3%); }
      100% { transform: translate(0, 0); }
    }

    .login-bg-glow {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background: radial-gradient(
        circle 600px at 50% 40%,
        rgba(232, 160, 48, 0.03) 0%,
        transparent 80%
      );
      animation: glowPulse 6s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      0%   { opacity: 0.5; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.08); }
    }

    /* Login Card */
    #loginWrapper {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 100dvh;
      padding: 24px;
    }

    .login-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.02) inset,
        0 32px 64px rgba(0, 0, 0, 0.6),
        0 0 80px rgba(232, 160, 48, 0.04);
      animation: cardEntrance 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Logo Area */
    .logo-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 36px;
    }

    .portal-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .site-logo {
      height: 40px;
      width: auto;
      opacity: 0.85;
      object-fit: contain;
    }

    .logo-fallback {
      display: none;
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    .site-logo.logo-error {
      display: none;
    }

    .site-logo.logo-error + .logo-fallback {
      display: block;
    }

    /* Heading */
    .card-heading {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-heading h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .card-heading p {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    /* Form */
    #loginForm {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .field-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 12px;
    }

    .field-wrap input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      color: var(--text-primary);
      padding: 14px 16px 14px 44px;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field-wrap input::placeholder {
      color: var(--text-muted);
    }

    .field-wrap input:focus {
      border-color: var(--input-border-focus);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(232, 160, 48, 0.08);
    }

    .field-wrap input:-webkit-autofill,
    .field-wrap input:-webkit-autofill:hover,
    .field-wrap input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #0d0d0d inset, 0 0 0 3px rgba(232, 160, 48, 0.08);
      -webkit-text-fill-color: #ffffff;
      caret-color: #ffffff;
      border-color: var(--input-border-focus);
    }

    .field-wrap .field-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
      transition: color 0.2s;
    }

    .field-wrap input:focus + .field-icon {
      color: rgba(232, 160, 48, 0.7);
    }

    /* Error Message */
    #loginError {
      display: none;
      align-items: center;
      gap: 8px;
      color: var(--error);
      font-size: 0.84rem;
      font-weight: 500;
      margin-top: 4px;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
      border-radius: 10px;
    }

    #loginError.visible {
      display: flex;
      animation: errorShake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes errorShake {
      10%, 90%      { transform: translateX(-2px); }
      20%, 80%      { transform: translateX(3px);  }
      30%, 50%, 70% { transform: translateX(-4px); }
      40%, 60%      { transform: translateX(4px);  }
    }

    /* Submit Button */
    #loginBtn {
      width: 100%;
      background: var(--accent);
      color: #000;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      letter-spacing: 0.01em;
      padding: 14px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(232, 160, 48, 0.25);
      position: relative;
      overflow: hidden;
    }

    #loginBtn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    #loginBtn:hover:not(:disabled) {
      opacity: 0.92;
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232, 160, 48, 0.35);
    }

    #loginBtn:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(232, 160, 48, 0.2);
    }

    #loginBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid transparent;
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 28px 0 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
    }

    .divider span {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.2);
      white-space: nowrap;
    }

    /* Back Link */
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--text-primary);
    }

    .back-link i {
      margin-right: 5px;
      font-size: 0.72rem;
    }

    /* Security Badge */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.18);
    }

    .security-badge i {
      font-size: 0.68rem;
      color: rgba(232, 160, 48, 0.3);
    }

    /* Responsive */
    @media (max-width: 440px) {
      .login-card {
        padding: 36px 24px;
        border-radius: 20px;
      }
      .card-heading h1 {
        font-size: 1.3rem;
      }
    }

    @media (max-height: 600px) {
      .login-card {
        padding: 28px 32px;
      }
      .logo-area {
        margin-bottom: 20px;
      }
      .card-heading {
        margin-bottom: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Animated background layers -->
  <div class="login-bg-effect" aria-hidden="true"></div>
  <div class="login-bg-glow" aria-hidden="true"></div>

  <!-- Main wrapper -->
  <div id="loginWrapper" role="main">
    <div class="login-card">

      <!-- Logo + portal label -->
      <div class="logo-area">
        <span class="portal-label">Admin Portal</span>
        <div class="logo-wrap">
          <img
            src="../assets/images/logo.png"
            alt="Cornel Media Productions"
            class="site-logo"
            id="siteLogo"
            loading="eager"
          />
          <span class="logo-fallback" aria-hidden="true">CMP</span>
        </div>
      </div>

      <!-- Heading -->
      <div class="card-heading">
        <h1>Sign In</h1>
        <p>Access the content management panel</p>
      </div>

      <!-- Login form -->
      <form id="loginForm" novalidate autocomplete="on">

        <!-- Email -->
        <div class="field-wrap">
          <input
            type="email"
            id="emailInput"
            name="email"
            placeholder="Email address"
            autocomplete="email"
            inputmode="email"
            required
            aria-label="Email address"
            aria-required="true"
          />
          <i class="fa-regular fa-envelope field-icon" aria-hidden="true"></i>
        </div>

        <!-- Password -->
        <div class="field-wrap" style="margin-bottom: 4px;">
          <input
            type="password"
            id="passwordInput"
            name="password"
            placeholder="Password"
            autocomplete="current-password"
            required
            aria-label="Password"
            aria-required="true"
          />
          <i class="fa-solid fa-lock field-icon" aria-hidden="true"></i>
        </div>

        <!-- Error message -->
        <div id="loginError" role="alert" aria-live="polite">
          <i class="fa-solid fa-circle-exclamation" aria-hidden="true"></i>
          <span id="loginErrorText"></span>
        </div>

        <!-- Submit -->
        <button type="submit" id="loginBtn" aria-label="Sign in to admin panel">
          <span id="btnText">Sign In</span>
        </button>

      </form>

      <!-- Divider -->
      <div class="divider" aria-hidden="true">
        <span>Cornel Media Productions</span>
      </div>

      <!-- Back to site -->
      <a href="https://cornelmedia-site.web.app" class="back-link" id="backLink">
        <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>Back to cornel.media
      </a>

      <!-- Security indicator -->
      <div class="security-badge" aria-hidden="true">
        <i class="fa-solid fa-shield-halved"></i>
        <span>Secured by Firebase Authentication</span>
      </div>

    </div><!-- /.login-card -->
  </div><!-- /#loginWrapper -->

  <!-- Firebase Auth -->
  <script type="module">
    import {
      auth,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from '../js/firebase-config.js';

    // Element references
    const loginForm      = document.getElementById('loginForm');
    const emailInput     = document.getElementById('emailInput');
    const passwordInput  = document.getElementById('passwordInput');
    const loginBtn       = document.getElementById('loginBtn');
    const btnText        = document.getElementById('btnText');
    const loginError     = document.getElementById('loginError');
    const loginErrorText = document.getElementById('loginErrorText');
    const siteLogo       = document.getElementById('siteLogo');

    // Logo fallback if image fails to load
    siteLogo.addEventListener('error', () => {
      siteLogo.classList.add('logo-error');
    });

    // Auto-redirect if already authenticated
    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.replace('dashboard.html');
      }
    });

    // --- Helpers ---

    function setLoading(isLoading) {
      if (isLoading) {
        loginBtn.disabled = true;
        btnText.textContent = 'Signing in\u2026';
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        spinner.id = 'loginSpinner';
        spinner.setAttribute('aria-hidden', 'true');
        loginBtn.insertBefore(spinner, btnText);
      } else {
        loginBtn.disabled = false;
        btnText.textContent = 'Sign In';
        const spinner = document.getElementById('loginSpinner');
        if (spinner) spinner.remove();
      }
    }

    function showError(message) {
      loginErrorText.textContent = message;
      loginError.classList.remove('visible');
      void loginError.offsetHeight; // force reflow to retrigger animation
      loginError.classList.add('visible');
    }

    function hideError() {
      loginError.classList.remove('visible');
    }

    function getFriendlyError(code) {
      switch (code) {
        case 'auth/invalid-credential':
        case 'auth/wrong-password':
        case 'auth/invalid-email':
          return 'Incorrect email or password.';
        case 'auth/user-not-found':
          return 'No account found with this email.';
        case 'auth/too-many-requests':
          return 'Too many attempts. Please try again later.';
        case 'auth/network-request-failed':
          return 'Network error. Check your connection.';
        case 'auth/user-disabled':
          return 'This account has been disabled.';
        default:
          return 'An error occurred. Please try again.';
      }
    }

    // --- Form Submit ---

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const email    = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      setLoading(true);

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Successful login — redirect to dashboard
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('[Admin Login] Auth error:', error.code, error.message);
        setLoading(false);
        showError(getFriendlyError(error.code));
        // Clear password on failure for security
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    // Clear error when user starts typing
    emailInput.addEventListener('input', hideError);
    passwordInput.addEventListener('input', hideError);

    // Auto-focus email field after card entrance animation
    setTimeout(() => emailInput.focus(), 300);
  </script>

</body>
</html>
