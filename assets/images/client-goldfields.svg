<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Gold Fields wordmark logo - dark navy text with gold accent bar -->
  <rect width="280" height="80" fill="none"/>
  <!-- Gold accent bar -->
  <rect x="0" y="60" width="280" height="4" fill="#C9A84C" rx="2"/>
  <!-- "Gold Fields" text -->
  <text x="140" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="700" fill="#1A2B4A" text-anchor="middle" letter-spacing="1">GOLD FIELDS</text>
  <!-- Ghana sub-label -->
  <text x="140" y="58" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="400" fill="#C9A84C" text-anchor="middle" letter-spacing="3">GHANA</text>
</svg>
